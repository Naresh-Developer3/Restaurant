<!DOCTYPE html>

<head>
    <title>Restaurant</title>
    
    <style>
        header{
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: cursive;   
            padding: 10px;
            background-color: black;
            color: orangered;
            margin-bottom: 5px;
        }
        header a{
            text-decoration-line: none;
            color: orangered;
        }
        header a:hover{
            color: white;
        }
        header img{
            border-radius: 50px; 
        }
        header h1{
            margin-right: 60%;
        }
        header h1:hover{
            text-shadow:0 0 30px orangered;
        }
        header button{
            background-color: orangered;
            border: 1px;
            padding-left: 10px;
            padding-right: 10px;
            padding-top: 5px;
            padding-bottom: 5px;
            border-radius: 3px;
            margin-right: 20px;
            font-size: large;
        }
        header button:hover{
            background-color: white;
            box-shadow: 0 0 30px white;
        }
        header label{
            margin-left: 5%;
        }
        header img:hover{
            box-shadow:0 0 30px white;
        }
        header a:hover{
            text-shadow: 0 0 30px white;
        }
        header button a{
            color: white;
        }
        header button a:hover{
            color: orangered;
        }
        .explore{
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url(bg.png);
            width: 100%;
            height: 40vh;
            background-repeat: no-repeat;
        }
        .explore button{
            border: 1px;
            padding-left: 15px;
            padding-right: 15px;
            padding-top: 10px;
            padding-bottom: 10px;
            border-radius: 5px;
            margin-right: 20px;
            font-size: large;
            color: rgb(0, 0, 0);
            background-color: orangered ;
        }
        .explore button:hover{
            color: black;
            background-color: white;
            box-shadow: 0 0 40px white;
        }
        .explore button a{
            text-decoration: none;
            color: rgb(255, 255, 255);
        }
        .explore button a:hover{
           color: rgb(0, 0, 0); 
        }
        select{
            background:  none;
            color: orangered;
            font-size: medium;
            font-family: cursive;
            border: none;
            /* border-radius: 5px; */
        }
        select:focus,option:focus{
            outline: none;
            border: transparent;
        }
        /* select:hover{
            box-shadow: 0 0 30px white;
        } */
        .content img{
            padding-top: 5px;
            width: 24.84%;
            border-radius: 25px;
        }
        .content img:hover{
            transform:translateY(-4px);
            
        }
        footer{
            background-color: black;
            height: 8.5vh;
        }
        footer h3{
            color: orangered;
            display: flex;
            justify-content: center;
            padding-top: 10px;
        }
        footer h3:hover{
            text-shadow: 0 0 30px white;
        }
        .icon{
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 100px;
            padding-right: 100px;
        }
        footer a{
            text-decoration: none;
            color: orangered;
        }
        footer a:hover{
            color: white;
            text-shadow: 0 0 30px white;
            text-decoration: underline 10% orangered;
        }
        marquee{
            font-family: cursive;
            background:linear-gradient(90deg,orangered,black,orangered,black,orangered,black) ;
            font-size: larger;
            font-weight: bold;
            height: 5vh;
            display: flex;
            align-items: center;
            color: white;
            margin-bottom: 5px;
        } 
        .icon1{
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            margin-right: 10px;
            color: white;
            padding: 2px;
            border-radius: 2px;
        }
        .icon2{     
            background-color: white;       
            color: #1877F2;
            margin-right: 10px;
            padding: 2px;
            border-radius: 2px;
        }
        .icon3{            
            color: #FF0000;
            background-color: white;
            margin-right: 10px;
            padding-left: 3px;
            padding-right: 3px;
            padding-top: 1px;
            border-radius: 2px;
        }
    </style>
</head>
